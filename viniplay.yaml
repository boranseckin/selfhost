name: viniplay

services:
  viniplay:
    image: ardovini/viniplay
    restart: unless-stopped
    volumes:
      - viniplay:/data
    env_file: viniplay.secret
    # SESSION_SECRET
    networks:
      - tailscale
    labels:
      tsbridge.enable: true
      tsbridge.service.name: tv

volumes:
  viniplay:

networks:
  tailscale:
    external: true
