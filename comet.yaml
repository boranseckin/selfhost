name: comet

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: comet
      POSTGRES_PASSWORD: comet
      POSTGRES_DB: comet
    volumes:
      - postgres:/var/lib/postgresql/data
    networks:
      - comet

  comet:
    image: g0ldyy/comet
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DASHBOARD_ADMIN_PASSWORD: comet
      DATABASE_TYPE: postgresql
      DATABASE_URL: comet:comet@postgres:5432
      SCRAPE_COMET: true
      SCRAPE_ZILEAN: true
      SCRAPE_TORRENTIO: true
      SCRAPE_MEDIAFUSION: true
      PROXY_DEBRID_STREAM: true
      PROXY_DEBRID_STREAM_MAX_CONNECTIONS: -1
      PROXY_DEBRID_STREAM_DEBRID_DEFAULT_SERVICE: realdebrid
    env_file: comet.secret
    # PROXY_DEBRID_STREAM_PASSWORD
    # PROXY_DEBRID_STREAM_DEBRID_DEFAULT_APIKEY
    volumes:
      - data:/app/data
    networks:
      - comet
      - tailscale
    labels:
      tsdproxy.enable: true
      tsdproxy.name: comet
      tsdproxy.container_port: 8000

volumes:
  data:
  postgres:

networks:
  comet:
    name: comet
  tailscale:
    external: true
